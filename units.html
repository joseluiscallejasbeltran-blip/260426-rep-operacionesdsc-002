<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Resumen por Unidad</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* keep the units page compact and single-screen friendly */
    body { display:flex; align-items:flex-start; justify-content:center; padding:12px; box-sizing:border-box; height:100vh; }
    .container { width:100%; max-width:720px; background:linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.9)); border-radius:12px; padding:12px; box-shadow:0 14px 34px rgba(2,6,7,0.24); overflow:auto; max-height:calc(100vh - 32px); }
    .row { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:10px; border-radius:10px; background:rgba(245,245,245,0.8); margin-bottom:8px; }
    .row h3 { margin:0; font-size:15px; }
    .meta { font-size:13px; color:#173a39; opacity:0.9; }
    .inc { color:#b20a0a; font-weight:700; }
    .btn-row { display:flex; gap:8px; margin-top:8px; justify-content:flex-end; }
    .small-muted { font-size:12px; color:#173a39; opacity:0.8; margin-bottom:8px; }
    @media (max-width:420px){ .container{padding:10px} .row{padding:8px} }
  </style>
</head>
<body>
  <div class="container" role="main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-weight:700">Resumen por unidad</div>
      <div style="display:flex;gap:8px">
        <button id="backBtn" class="btn">Cerrar</button>
        <button id="refreshBtn" class="btn">Actualizar</button>
      </div>
    </div>

    <div class="small-muted">Aquí se muestra la información consolidada por unidad: reportes totales, reportes recientes y número total de incidencias.</div>

    <div id="unitsList" style="margin-top:10px"></div>

    <div class="btn-row">
      <button id="exportAll" class="btn">Exportar JSON</button>
      <button id="clearData" class="btn">Borrar todo (local)</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "bitacora_unidades_v1";

    function loadState(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { units: [], reports: [] };
        return JSON.parse(raw);
      } catch(e) {
        console.warn("Error loading state", e);
        return { units: [], reports: [] };
      }
    }

    function render(){
      const state = loadState();
      const units = state.units || [];
      const reports = state.reports || [];

      const list = document.getElementById("unitsList");
      list.innerHTML = "";

      if(units.length === 0){
        list.innerHTML = `<div class="row"><div style="flex:1"><h3>No hay unidades registradas</h3><div class="meta">Crea unidades desde la pantalla principal.</div></div></div>`;
        return;
      }

      units.forEach(u=>{
        const unitReports = reports.filter(r => r.unitId === u.id);
        const total = unitReports.length;
        const latest = unitReports.sort((a,b)=>b.createdAt - a.createdAt)[0];
        const incidents = unitReports.reduce((acc, r)=> acc + (r.incidentsCount || 0), 0);
        const checksTotal = unitReports.reduce((acc, r)=> acc + ((r.checks && r.checks.length) || 0), 0);
        const checksOk = unitReports.reduce((acc, r)=> acc + ((r.checks && r.checks.filter(c=>c.checked).length) || 0), 0);

        const el = document.createElement("div");
        el.className = "row";
        el.innerHTML = `
          <div style="flex:1;min-width:0">
            <h3>${escapeHtml(u.name || "Unidad")}</h3>
            <div class="meta">${total} reportes • ${checksOk}/${checksTotal} checks OK${latest ? ' • Último: ' + (new Date(latest.createdAt).toLocaleString()) : ''}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div class="meta">Incidencias totales: <span class="inc">${incidents}</span></div>
            <div style="display:flex;gap:6px">
              <button class="btn view-reports" data-id="${u.id}">Ver reportes</button>
              <button class="btn export-unit" data-id="${u.id}">Exportar</button>
            </div>
          </div>
        `;
        list.appendChild(el);
      });

      // attach handlers
      document.querySelectorAll(".view-reports").forEach(b=>{
        b.onclick = (ev)=>{
          const id = ev.currentTarget.dataset.id;
          showReportsForUnit(id);
        };
      });
      document.querySelectorAll(".export-unit").forEach(b=>{
        b.onclick = (ev)=>{
          const id = ev.currentTarget.dataset.id;
          exportUnit(id);
        };
      });
    }

    function showReportsForUnit(unitId){
      const state = loadState();
      const unit = (state.units||[]).find(u=>u.id===unitId);
      const reports = (state.reports||[]).filter(r=>r.unitId===unitId).sort((a,b)=>b.createdAt - a.createdAt);
      if(!unit) return alert("Unidad no encontrada");
      const cols = reports.map(r=>{
        return `- ${new Date(r.createdAt).toLocaleString()} — ${escapeHtml(r.title||"Reporte")} ${r.plate? ' • <span style="color:#b20a0a;font-weight:700">' + escapeHtml(r.plate) + '</span>':''} ${r.incidentsCount ? ' • <span style="color:#b20a0a;font-weight:700">' + r.incidentsCount + ' incid.' + '</span>':''}`;
      }).join("\n");
      const text = `Reportes para ${unit.name}:\n\n${cols || "— sin reportes —"}`;
      alert(text);
    }

    function exportUnit(unitId){
      const state = loadState();
      const unit = (state.units||[]).find(u=>u.id===unitId);
      if(!unit) return alert("Unidad no encontrada");
      const data = {
        unit,
        reports: (state.reports||[]).filter(r=>r.unitId===unitId)
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `unidad_${(unit.name||unit.id).replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(str){ return String(str||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }

    document.getElementById("backBtn").onclick = ()=> window.history.back();
    document.getElementById("refreshBtn").onclick = render;
    document.getElementById("exportAll").onclick = ()=>{
      const state = loadState();
      const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `bitacora_unidades_full_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    };
    document.getElementById("clearData").onclick = ()=>{
      if(!confirm("Borrar todos los datos almacenados localmente?")) return;
      localStorage.removeItem(STORAGE_KEY);
      render();
    };

    // initial render
    render();
  </script>
</body>
</html>
